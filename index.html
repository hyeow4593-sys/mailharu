<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailHaru | eBook Library</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  body { font-family:'Noto Sans KR',sans-serif; margin:0; background:#e0f2f7; }
  .container { max-width:1200px; margin:0 auto; padding:20px; }
  h2 { text-align:center; margin-bottom:25px; }
  .season-panels { display:grid; grid-template-columns:1fr; gap:25px; }
  @media(min-width:768px){ .season-panels{grid-template-columns:1fr 1fr;} }
  .season-panel { background:white; border-radius:10px; overflow:hidden; text-align:center; box-shadow:0 4px 6px rgba(60,64,67,0.1); }
  .season-panel img { width:100%; height:250px; object-fit:cover; }
  .season-panel-content { padding:20px; }
  .panel-button { display:inline-block; padding:10px 15px; margin:5px; border:none; border-radius:5px; background:#3f51b5; color:white; text-decoration:none; cursor:pointer; }
  .panel-button:hover { background:#303f9f; }
</style>
</head>
<body>
<div class="container">
  <h2>Online Reading Room: Four Seasons</h2>
  <div class="season-panels">
    <div class="season-panel">
      <img src="images/spring.png" alt="Spring">
      <div class="season-panel-content">
        <p>Fresh and lively stories of Spring</p>
        <a class="panel-button" href="viewer.html?epub=epubs/book_spring.epub&title=Spring" target="_blank">Read eBook</a>
      </div>
    </div>
    <div class="season-panel">
      <img src="images/summer.png" alt="Summer">
      <div class="season-panel-content">
        <p>Hot and sunny memories of Summer</p>
        <a class="panel-button" href="viewer.html?epub=epubs/book_summer.epub&title=Summer" target="_blank">Read eBook</a>
      </div>
    </div>
    <div class="season-panel">
      <img src="images/autumn.png" alt="Autumn">
      <div class="season-panel-content">
        <p>Deep reflections in Autumn</p>
        <a class="panel-button" href="viewer.html?epub=epubs/book_autumn.epub&title=Autumn" target="_blank">Read eBook</a>
      </div>
    </div>
    <div class="season-panel">
      <img src="images/winter.png" alt="Winter">
      <div class="season-panel-content">
        <p>Warm stories in Winter snow</p>
        <a class="panel-button" href="viewer.html?epub=epubs/book_winter.epub&title=Winter" target="_blank">Read eBook</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
