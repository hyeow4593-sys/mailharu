<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메일하루 | 시민 참여 전자책 도서관</title>
    <link rel="shortcut icon" href="data:," type="image/x-icon"> 
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- CSS Variables for consistent styling --- */
        :root {
            --primary-blue: #3f51b5;
            --text-dark: #202124;
            --text-gray: #5f6368;
            --border-light: #dadce0;
            /* ⭐ 메인 배경색 변경 ⭐ */
            --main-bg: #e0f2f7; /* 연한 하늘색 계열 */
            --card-bg: white;
            --card-shadow: 0 4px 6px rgba(60,64,67,0.1), 0 1px 3px rgba(60,64,67,0.08);
        }

        /* --- Global Styles --- */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--main-bg); 
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- Top Navigation Bar --- */
        .top-nav {
            background-color: white;
            border-bottom: 1px solid var(--border-light);
            padding: 10px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .top-nav-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .top-nav .logo {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--text-dark);
        }
        .top-nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .top-nav-link {
            color: var(--text-gray);
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.95em;
        }
        .top-nav-link:hover {
            color: var(--primary-blue);
        }
        .top-nav-button { 
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: 500;
            transition: background-color 0.2s;
            font-size: 0.9em;
        }
        .top-nav-button:hover {
            background-color: #303f9f;
        }
        .top-nav-icon {
            font-size: 1.2em;
            color: var(--text-gray);
            cursor: pointer;
            transition: color 0.2s;
        }
        .top-nav-icon:hover {
            color: var(--primary-blue);
        }
        .top-nav-divider {
            height: 20px;
            width: 1px;
            background-color: var(--border-light);
            margin: 0 5px;
        }

        /* --- Hero Banner --- */
        .hero-banner {
            background-color: #3f51b5;
            color: white;
            padding: 50px 0;
            margin-bottom: 40px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-image: url('images/캡처.PNG'); 
            background-size: cover;
            background-position: center;
            height: 250px; 
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.5); 
            border-radius: 8px;
        }
        .hero-banner-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin-left: 40px;
            text-align: left;
        }
        .hero-banner-content h2 {
            font-size: 2.2em;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        .hero-banner-content p {
            font-size: 1em;
            margin-bottom: 20px;
        }
        .hero-banner-content .banner-button {
            display: inline-block;
            background-color: white;
            color: var(--primary-blue);
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 500;
        }

        /* --- Section Title --- */
        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 25px;
            padding-top: 10px;
            text-align: center; 
        }

        /* --- 4-Panel Season Layout --- */
        .season-panels {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        @media (min-width: 768px) { 
            .season-panels {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1024px) { 
            .season-panels {
                gap: 40px;
            }
        }

        .season-panel {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            position: relative; 
        }
        .season-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .season-panel-image {
            width: 100%;
            height: 350px; 
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--border-light);
            box-sizing: border-box;
            position: relative;
        }
        .season-panel-image::before { 
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.3); 
            transition: background-color 0.2s;
        }
        .season-panel:hover .season-panel-image::before {
            background-color: rgba(0,0,0,0.5); 
        }

        .season-panel-content {
            padding: 20px 25px 25px; 
            flex-grow: 1;
            text-align: center; 
            position: relative;
            z-index: 2; 
            color: var(--text-dark);
        }
        .season-panel-content h3 { display: none; } 

        .season-panel-content p {
            font-size: 1em;
            color: var(--text-gray);
            margin-bottom: 20px;
        }
        /* 버튼 그룹 */
        .panel-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px; 
        }
        .panel-button {
            display: block;
            width: 100%;
            padding: 12px 15px; 
            border-radius: 5px;
            font-weight: 500;
            transition: background-color 0.2s, opacity 0.2s;
            text-align: center;
            box-sizing: border-box; 
        }
        .read-button {
            background-color: var(--primary-blue);
            color: white;
            border: 1px solid var(--primary-blue); 
        }
        .read-button:hover {
            background-color: #303f9f;
        }
        .audio-button {
            background-color: #FF5722; 
            color: white;
            border: 1px solid #FF5722; 
        }
        .audio-button:hover {
            background-color: #E64A19;
        }
        
        .season-panel-link { display: none; }


        /* --- Footer --- */
        .footer-actions {
            background-color: white;
            border-top: 1px solid var(--border-light);
            padding: 30px 0;
            text-align: center;
            margin-top: 40px;
        }
        .footer-actions .button {
            display: inline-flex;
            align-items: center;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 1px 3px rgba(60,64,67,0.1);
            margin: 0 5px;
        }
        .footer-actions .primary-button {
            background-color: var(--primary-blue);
            color: white;
        }
        .footer-actions .secondary-button {
            background-color: white;
            color: var(--primary-blue);
            border: 1px solid var(--border-light);
        }
        
        /* --- Modal Styles --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 100; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.6); 
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #888;
            width: 90%;
            max-width: 400px; 
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            text-align: left;
        }
        .close-button {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 20px;
            cursor: pointer;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 5px; color: var(--text-dark); }
        .form-group input[type="text"], .form-group input[type="email"] { width: 100%; padding: 10px; border: 1px solid var(--border-light); border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        .modal-buttons { text-align: center; margin-top: 20px; }
        .modal-buttons .primary-button { width: 100%; padding: 12px; font-size: 1.1em; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="container top-nav-inner">
            <a href="#" class="logo">메일하루</a>
            <div class="top-nav-right">
                <a href="https://naver.me/x6x6E7L2" target="_blank" class="top-nav-icon"><i class="fas fa-search"></i></a> <div class="top-nav-divider"></div>
                
                <a href="https://naver.me/x6x6E7L2" target="_blank" class="top-nav-link" id="navSubscribeLink">구독신청</a> <a href="https://naver.me/531Nnlro" target="_blank" class="top-nav-button"><i class="fas fa-edit"></i> 전자책 투고하기</a> <a href="#" class="top-nav-icon"><i class="fas fa-user-circle"></i></a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero-banner">
            <div class="hero-banner-content">
                <h2>시민이 만드는 책, 도서관이 발행하는 책</h2>
                <p>부산 시민의 일상 생각과 이야기를 담아 매달 발행되는 참여형 전자책 메일링 서비스.</p>
                <a href="https://naver.me/x6x6E7L2" target="_blank" class="banner-button" id="bannerSubscribeBtn">✉️ 구독 서비스 신청하기</a> 
            </div>
        </div>

        <h2 class="section-title">온라인 열람실: 사계절 테마</h2>
        

        <div class="season-panels" id="seasonPanels">
            

        </div>
    </div>

    <div class="footer-actions">
        <div class="container">
            <a href="https://naver.me/x6x6E7L2" target="_blank" id="footerSubscribeBtn" class="button primary-button"><i class="fas fa-envelope"></i>메일링 서비스 구독</a>
            
            <a href="#" id="downloadBtn" class="button secondary-button"><i class="fas fa-download"></i>이 페이지 다운로드</a>
        </div>
    </div>

    <div id="subscribeModal" class="modal" style="display: none;"> 
        <div class="modal-content">
            <span class="close-button" id="closeSubscribeModal">&times;</span>
            <h3 style="color: var(--primary-blue); margin-top: 0;">💌 메일링 서비스 구독 신청</h3>
            <p style="color: var(--text-gray); font-size: 0.9em; margin-bottom: 25px;">매월 발행되는 시민 참여 전자책을 이메일로 받아보세요.</p>

            <form id="subscribeForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="phone">전화번호</label>
                    <input type="text" id="phone" name="phone" required placeholder="010-XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" required placeholder="yourname@example.com">
                </div>
                <div class="modal-buttons">
                    <button type="submit" class="button primary-button">구독 신청 완료</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeInfoModal">&times;</span> 
            <h3 id="modalTitle" style="color: var(--primary-blue);">알림</h3>
            <p id="modalBody" style="margin: 20px 0;"></p>
            <button class="button primary-button" onclick="document.getElementById('infoModal').style.display='none'">확인</button>
        </div>
    </div>

    <script>
        const seasonPanelsElement = document.getElementById('seasonPanels'); 
        const downloadBtn = document.getElementById('downloadBtn');
        const subscribeModal = document.getElementById('subscribeModal');
        const closeSubscribeModal = document.getElementById('closeSubscribeModal');
        const subscribeForm = document.getElementById('subscribeForm');
        const infoModal = document.getElementById('infoModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const closeInfoModal = document.getElementById('closeInfoModal'); 

        function showInfoModal(title, body) {
            modalTitle.textContent = title;
            modalBody.textContent = body;
            infoModal.style.display = 'block';
        }

        // ⭐⭐⭐ 최종 수정된 부분: EPUB 파일명을 영문 파일명으로 통일 ⭐⭐⭐
        const EPUB_FOLDER = "epubs/"; // 폴더명 소문자 확인
        const seasonData = [
            // 파일 이름을 영문으로 변경
            { id: 1, theme: "봄", title: "새로운 시작", desc: "생동감 넘치는 봄의 이야기들", imageUrl: "images/봄.PNG", epubFile: "book_spring.epub" }, 
            { id: 2, theme: "여름", title: "뜨거운 열정", desc: "시원한 바다와 휴가의 추억", imageUrl: "images/여름.PNG", epubFile: "book_summer.epub" }, 
            { id: 3, theme: "가을", title: "사색의 계절", desc: "깊어가는 가을날의 감성 기록", imageUrl: "images/가을.PNG", epubFile: "book_autumn.epub" }, 
            { id: 4, theme: "겨울", title: "따뜻한 위로", desc: "하얀 설경 속 포근한 이야기", imageUrl: "images/겨울.PNG", epubFile: "book_winter.epub" }
        ];
        
        /**
         * 계절 테마 데이터를 받아 HTML 패널 문자열을 생성합니다.
         */
        function createSeasonPanel(season) {
            const fullEpubPath = EPUB_FOLDER + season.epubFile;
            // 인코딩된 경로를 URL 파라미터로 전달
            const viewerLink = `viewer.html?epub=${encodeURIComponent(fullEpubPath)}&title=${encodeURIComponent(season.title)}&v=${Date.now()}`;

            return `
                <div class="season-panel" data-theme="${season.theme}">
                    <a href="${viewerLink}" target="_blank" title="${season.title} 열람하기">
                        <div class="season-panel-image" style="background-image: url('${season.imageUrl}');" role="img" aria-label="${season.theme} 테마 이미지"></div>
                    </a>
                    <div class="season-panel-content">
                        
<p>${season.desc}</p>
                        
                        <div class="panel-actions">
                            <a href="${viewerLink}" target="_blank" class="panel-button read-button">
                                <i class="fas fa-book-open"></i> 전자책 열람하기
                            </a>
                            <button class="panel-button audio-button" data-theme="${season.theme}" onclick="playAudiobook(this.getAttribute('data-theme'))">
                                <i class="fas fa-headphones"></i> 오디오북으로 듣기
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        // ⭐⭐⭐ 최종 수정된 부분 끝 ⭐⭐⭐
        
        /**
         * 오디오북 버튼 클릭 시 호출되는 함수
         */
        function playAudiobook(theme) {
            showInfoModal(
                "🎧 오디오북 서비스 안내", 
                "현재 오디오북 콘텐츠 제작 중입니다. 잠시만 기다려 주세요! 😊" 
            );
        }

        function downloadFile() {
            showInfoModal("다운로드 안내", `현재 브라우저에서 '파일 -> 다른 이름으로 저장' 기능을 사용해 index.html 파일을 직접 저장해주세요.`);
        }

        function renderSeasonPanels() {
            seasonPanelsElement.innerHTML = seasonData.map(createSeasonPanel).join('');
        }
        
        // --- 이벤트 리스너 ---
        document.addEventListener('DOMContentLoaded', () => {
            renderSeasonPanels(); 
            
            if (downloadBtn) downloadBtn.addEventListener('click', (e) => {
                e.preventDefault();
                downloadFile(); 
            });

            // 모달 닫기
            [closeSubscribeModal, closeInfoModal].forEach(btn => {
                if (btn) btn.addEventListener('click', () => {
                    btn.closest('.modal').style.display = 'none';
                });
            });
            window.addEventListener('click', (event) => {
                if (event.target == subscribeModal || event.target == infoModal) {
                    event.target.style.display = 'none';
                }
            });
            
            // 폼 제출 처리
            if (subscribeForm) subscribeForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                
                subscribeModal.style.display = 'none';
                
                showInfoModal(
                    "구독 신청 완료",
                    `${name}님, 구독 신청이 완료되었습니다! (데이터는 콘솔에 출력되었습니다.)`
                );
                
                subscribeForm.reset();
            });
        });

    </script>
</body>
</html>
