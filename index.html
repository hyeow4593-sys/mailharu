<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메일하루 | 시민 참여 전자책 도서관</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-blue: #3f51b5;
    --text-dark: #202124;
    --text-gray: #5f6368;
    --border-light: #dadce0;
    --main-bg: #e0f2f7;
    --card-bg: white;
    --card-shadow: 0 4px 6px rgba(60,64,67,0.1),0 1px 3px rgba(60,64,67,0.08);
}

body { margin:0; font-family:'Noto Sans KR',sans-serif; background:var(--main-bg); line-height:1.6; }
a { text-decoration:none; color:inherit; }
.container { max-width:1200px; margin:0 auto; padding:0 20px; }

.top-nav { background:white; border-bottom:1px solid var(--border-light); padding:10px 0; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 2px rgba(0,0,0,0.05);}
.logo { font-size:1.5em; font-weight:700; color:var(--text-dark); }
.top-nav-right { display:flex; gap:20px; align-items:center; }
.top-nav-link { color:var(--text-gray); font-weight:500; font-size:0.95em; }
.top-nav-link:hover { color:var(--primary-blue); }
.top-nav-button { background:var(--primary-blue); color:white; padding:8px 15px; border-radius:5px; font-size:0.9em; }
.top-nav-button:hover { background:#303f9f; }

/* 상단 이미지 배너 */
.hero-banner { 
    background-image:url('images/top-banner.png'); 
    background-size:cover; 
    background-position:center; 
    height:250px; 
    border-radius:8px; 
    position:relative; 
    box-shadow:0 4px 10px rgba(0,0,0,0.1); 
    margin-bottom:40px;
    margin-top:25px;
}
.hero-banner::before { 
    content:""; position:absolute; top:0; left:0; right:0; bottom:0; 
    background-color:rgba(0,0,0,0.5); border-radius:8px; 
}
.hero-banner-content { position:relative; z-index:1; max-width:800px; margin-left:40px; color:white; }
.hero-banner-content h2 { font-size:2.2em; margin:0 0 10px 0; font-weight:700; }
.hero-banner-content p { font-size:1em; margin-bottom:20px; }
.banner-button { background:white; color:var(--primary-blue); padding:10px 20px; border-radius:5px; font-weight:500; }

/* 영상 배너 */
.video-banner {
    width: 100%;
    height: 55vh;
    margin: 20px 0 50px 0;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.video-banner video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 커스텀 영상 컨트롤 */
#videoControls {
    position: absolute;
    right: 20px;
    bottom: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.55);
    padding: 10px;
    border-radius: 50px;
    backdrop-filter: blur(5px);
}
#videoControls button {
    background: transparent;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}
#volumeControl {
    width: 100px;
}

/* 시즌 카드 */
.section-title { font-size:1.8em; font-weight:700; text-align:center; margin-bottom:25px; }
.season-panels { display:grid; grid-template-columns:1fr; gap:25px; margin-bottom:40px; }
@media(min-width:768px){ .season-panels { grid-template-columns:1fr 1fr; } }
@media(min-width:1024px){ .season-panels { gap:40px; } }

.season-panel { background:var(--card-bg); border-radius:10px; box-shadow:var(--card-shadow); overflow:hidden; display:flex; flex-direction:column; border:1px solid var(--border-light); transition: transform 0.2s, box-shadow 0.2s; position:relative; }
.season-panel:hover { transform:translateY(-5px); box-shadow:0 8px 15px rgba(0,0,0,0.15); }
.season-panel-image { width:100%; height:350px; background-size:cover; background-position:center; border-bottom:1px solid var(--border-light); position:relative; }
.season-panel-image::before { content:""; position:absolute; top:0; left:0; right:0; bottom:0; background-color:rgba(0,0,0,0.3); transition:0.2s; }
.season-panel:hover .season-panel-image::before { background-color:rgba(0,0,0,0.5); }
.season-panel-content { padding:20px 25px 25px; flex-grow:1; text-align:center; position:relative; z-index:2; color:var(--text-dark); }
.season-panel-content p { color:var(--text-gray); margin-bottom:20px; }

.panel-actions { display:flex; flex-direction:column; gap:10px; }
.panel-button { display:block; width:100%; padding:12px 15px; font-size:1rem; border-radius:5px; font-weight:500; text-align:center; transition:0.2s; box-sizing:border-box; }
.read-button { background:var(--primary-blue); color:white; border:1px solid var(--primary-blue); }
.read-button:hover { background:#303f9f; }
.audio-button { background:#FF5722; color:white; border:1px solid #FF5722; }
.audio-button:hover { background:#E64A19; }

.footer-actions { background:white; border-top:1px solid var(--border-light); padding:30px 0; text-align:center; margin-top:40px; }
.footer-actions .button { display:inline-flex; align-items:center; padding:12px 25px; border-radius:6px; font-weight:500; cursor:pointer; box-shadow:0 1px 3px rgba(60,64,67,0.1); margin:0 5px; }
</style>
</head>

<body>

<nav class="top-nav">
  <div class="logo">메일하루</div>
  <div class="top-nav-right">
    <a href="https://naver.me/x6x6E7L2" target="_blank" class="top-nav-link">구독신청</a>
    <a href="https://naver.me/531Nnlro" target="_blank" class="top-nav-button"><i class="fas fa-edit"></i> 전자책 투고하기</a>
  </div>
</nav>

<div class="container">

  <!-- 상단 이미지 배너 -->
  <div class="hero-banner">
    <div class="hero-banner-content">
      <h2>시민이 만드는 책, 도서관이 발행하는 책</h2>
      <p>부산 시민의 일상 생각과 이야기를 담아 매달 발행되는 참여형 전자책 메일링 서비스.</p>
      <a href="https://naver.me/x6x6E7L2" target="_blank" class="banner-button">✉️ 구독 서비스 신청하기</a>
    </div>
  </div>

  <!-- 영상 배너 -->
  <div class="video-banner">
    <video id="mainVideo" autoplay muted loop playsinline>
      <source src="video/banner.mp4" type="video/mp4">
      지원되지 않는 브라우저입니다.
    </video>

    <!-- 커스텀 컨트롤 -->
    <div id="videoControls">
      <button id="playPauseBtn"><i class="fas fa-pause"></i></button>
      <input type="range" id="volumeControl" min="0" max="1" step="0.05" value="0.5" title="Volume">
      <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
    </div>
  </div>

  <h2 class="section-title">온라인 열람실: 사계절 테마</h2>
  <div class="season-panels" id="seasonPanels"></div>

</div>

<div class="footer-actions">
  <a href="https://naver.me/x6x6E7L2" target="_blank" class="button"><i class="fas fa-envelope"></i> 메일링 서비스 구독</a>
</div>

<script>
/* 🎮 영상 제어 */
const video = document.getElementById("mainVideo");
const playPauseBtn = document.getElementById("playPauseBtn");
const volumeControl = document.getElementById("volumeControl");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const playIcon = playPauseBtn.querySelector("i");

// 재생/일시정지
playPauseBtn.addEventListener("click", () => {
    if(video.paused){
        video.play();
        playIcon.classList.remove("fa-play");
        playIcon.classList.add("fa-pause");
    } else {
        video.pause();
        playIcon.classList.remove("fa-pause");
        playIcon.classList.add("fa-play");
    }
});

// 볼륨 조절
volumeControl.addEventListener("input", () => {
    video.volume = volumeControl.value;
});

// 전체 화면
fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
        video.parentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

/* 시즌 카드 생성 */
const seasonPanelsElement = document.getElementById('seasonPanels');

const seasonData = [
    { theme: "봄", title: "새로운 시작", desc: "이 책에서의 봄은 양면성이 분명하지만 긍정적인 기대감을 갖고 있습니다. 그 마음을 간직하다보면 새로운 시작을 향한 용기를 얻을 수 있습니다.", imageUrl: "images/spring.png", epubFile: "book_spring.epub" },
    { theme: "여름", title: "뜨거운 열정", desc: "여름은 강렬한 햇살에도 즐거움을 놓치지 않는 순간들을 담고 있습니다. 뜨거운 계절 속에서 숨겨진 열정과 기쁨을 만나보세요. ", imageUrl: "images/summer.png", epubFile: "book_summer.epub" },
    { theme: "가을", title: "사색의 계절", desc: "가을은 마음을 조용히 돌아볼 수 있게 해주는 계절입니다. 낙엽이 흩날리는 행복 사이에서 일상의 아름다움을 느낄 수 있습니다.  ", imageUrl: "images/autumn.png", epubFile: "book_autumn.epub" },
    { theme: "겨울", title: "따뜻한 위로", desc: "주변 사람들과 함께하는 맛있는 음식은 온기를 가득 채워줍니다. 겨울과 함께 맞이하는 포근한 위로를 느껴보세요.", imageUrl: "images/winter.png", epubFile: "book_winter.epub" }
];

function createSeasonPanel(season){
  const viewerLink = `viewer.html?epub=${encodeURIComponent(season.epubFile)}&title=${encodeURIComponent(season.title)}`;
  return `
  <div class="season-panel">
    <a href="${viewerLink}" target="_blank">
      <div class="season-panel-image" style="background-image: url('${season.imageUrl}');"></div>
    </a>
    <div class="season-panel-content">
      <p>${season.desc}</p>
      <div class="panel-actions">
        <a href="${viewerLink}" target="_blank" class="panel-button read-button">
          <i class="fas fa-book-open"></i> 전자책 열람하기
        </a>
        <button class="panel-button audio-button" onclick="alert('🎧 오디오북 준비 중입니다!')">
          <i class="fas fa-headphones"></i> 오디오북으로 듣기
        </button>
      </div>
    </div>
  </div>`;
}

seasonPanelsElement.innerHTML = seasonData.map(createSeasonPanel).join('');
</script>

</body>
</html>
