<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBook Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    display: flex; flex-direction: column;
    font-family: 'Noto Sans KR', sans-serif;
    background: #f4f6f9;
  }
  nav {
    background: white; border-bottom: 1px solid #dadce0;
    padding: 10px 20px; display: flex;
    justify-content: space-between; align-items: center;
  }
  nav .logo { font-weight: 700; font-size: 1.3rem; }
  nav .btn-group { display: flex; gap: 10px; }
  button, a.button {
    background: #3f51b5; color: white; border: none;
    border-radius: 5px; padding: 6px 12px;
    cursor: pointer; font-weight: 500; font-size: 0.9rem;
    text-decoration: none;
  }
  button:hover, a.button:hover { background: #303f9f; }

  #viewer-container {
    flex: 1; position: relative; overflow: hidden; background: #fff;
  }
  #reader { width: 100%; height: 100%; overflow: hidden; }
  #status {
    text-align: center; font-size: 0.9rem; color: #5f6368;
    padding: 6px; border-top: 1px solid #ddd; background: #fafafa;
  }
  .error-message { text-align:center; color:#d32f2f; padding:40px; font-size:1.1rem; }

  /* 좌우 사이드 버튼 */
  .side-button {
    position: absolute; top: 50%;
    transform: translateY(-50%);
    padding: 12px 20px; font-size: 1rem;
    background: rgba(63,81,181,0.8); color: white;
    border: none; border-radius: 5px; cursor: pointer;
    transition: background 0.2s; z-index: 50;
  }
  #sidePrev { left: 10px; }
  #sideNext { right: 10px; }
  .side-button:hover { background: rgba(48,63,159,0.9); }
</style>
</head>
<body>
<nav>
  <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none;">📘 메일하루</a></div>
  <div class="btn-group">
    <button id="btnPrev"><i class="fas fa-arrow-left"></i></button>
    <button id="btnNext"><i class="fas fa-arrow-right"></i></button>
    <button id="btnFontUp">A+</button>
    <button id="btnFontDown">A-</button>
    <a href="index.html" class="button"><i class="fas fa-home"></i> Home</a>
  </div>
</nav>

<div id="viewer-container">
  <div id="reader"></div>

  <!-- 좌우 사이드 버튼 -->
  <button id="sidePrev" class="side-button"><i class="fas fa-arrow-left"></i> Previous</button>
  <button id="sideNext" class="side-button">Next <i class="fas fa-arrow-right"></i></button>
</div>

<div id="status">Loading...</div>

<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const epubPath = params.get("epub");
const bookTitle = params.get("title") || "eBook";
document.title = `${bookTitle} | MailHaru eBook`;

if(!epubPath){
  document.body.innerHTML = '<div class="error-message">❌ ePub path not specified.</div>';
  throw new Error("No epub path");
}

const status = document.getElementById("status");
const reader = document.getElementById("reader");

try{
  const book = ePub(epubPath); // 상대경로
  const rendition = book.renderTo(reader,{width:"100%",height:"100%",spread:"auto"});
  let fontSize = 100;
  rendition.themes.default({
    "body":{
      "font-family":"'Noto Sans KR',sans-serif",
      "line-height":"1.7",
      "padding":"24px"
    }
  });
  rendition.display();

  book.ready.then(()=> status.textContent="✅ Loaded")
           .catch(err=> { console.error(err); status.textContent="⚠️ Error loading"; });

  // 상단 버튼
  document.getElementById("btnPrev").onclick = ()=> rendition.prev();
  document.getElementById("btnNext").onclick = ()=> rendition.next();
  document.getElementById("btnFontUp").onclick = ()=> { fontSize = Math.min(fontSize+10,200); rendition.themes.fontSize(fontSize+"%"); };
  document.getElementById("btnFontDown").onclick = ()=> { fontSize = Math.max(fontSize-10,60); rendition.themes.fontSize(fontSize+"%"); };

  // 좌우 사이드 버튼
  document.getElementById("sidePrev").onclick = ()=> rendition.prev();
  document.getElementById("sideNext").onclick = ()=> rendition.next();

  // 키보드
  document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") rendition.next();
    if(e.key==="ArrowLeft") rendition.prev();
  });
}catch(err){
  console.error(err);
  document.body.innerHTML = `<div class="error-message">❌ Cannot load eBook.<br>${err.message}</div>`;
}
</script>
</body>
</html>
